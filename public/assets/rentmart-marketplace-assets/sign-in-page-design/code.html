<main class="flex min-h-screen w-full">
<!-- Left Side: Login Form -->
<section class="w-full lg:w-1/2 bg-white flex flex-col justify-center px-8 sm:px-16 lg:px-24 xl:px-32 relative">
<div class="max-w-[480px] w-full mx-auto">

<div class="mb-stack-lg flex items-center gap-2">
<span class="text-primary font-h3 font-bold tracking-tight">Rentmart</span>
</div>
<header class="mb-stack-lg">
<h1 class="font-h1 text-h1 text-primary mb-2">Welcome back to Rentmart</h1>
<p class="font-body-base text-body-base text-on-surface-variant">Please enter your details to access your dashboard.</p>
</header>
<form class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-DEFAULT font-body-base text-body-base form-input-focus placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="password">Password</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-DEFAULT font-body-base text-body-base form-input-focus placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary font-semibold hover:underline" href="#">Forgot Password?</a>
</div>
<!-- CTA -->
<div class="pt-stack-md">
<button class="w-full bg-primary-container text-white py-4 rounded-DEFAULT font-body-base font-semibold hover:bg-primary transition-all active:opacity-80 flex justify-center items-center gap-2">
                            Sign In
                        </button>
</div>
</form>
<footer class="mt-stack-lg text-center">
<p class="font-body-base text-body-base text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Sign up.</a>
</p>
</footer>
</div>
</section>
<!-- Right Side: Brand Showcase -->

<!-- Decorative Subtle Grid Background (Soft architectural feel) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#012d1d 1px, transparent 1px); background-size: 40px 40px;"></div>
